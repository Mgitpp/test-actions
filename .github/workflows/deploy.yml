name: Build and Deploy VPe04

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: vpe04-fastapi

jobs:
  build-and-push:
    name: Build and push image to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/vpe04-fastapi
          tags: |
            type=raw,value=latest
            type=sha

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Deploy to VPS over SSH
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy on remote server
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            set -e

            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u "${{ secrets.GHCR_USER }}" --password-stdin

            docker pull ghcr.io/${{ github.repository_owner }}/vpe04-fastapi:latest

            docker stop vpe04-fastapi || true
            docker rm vpe04-fastapi || true

            docker run -d \
              --name vpe04-fastapi \
              --restart unless-stopped \
              -p 8001:8000 \
              ghcr.io/${{ github.repository_owner }}/vpe04-fastapi:latest

            docker image prune -f